<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FutureVizion</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/network.css" />
  </head>
  <body>
    <svg id="network-graph" width="1500" height="900"></svg>
    <button id="back">Back To Departments</button>
    <input
      id="search"
      type="text"
      placeholder="Search For Careers Within This Department"
    />
    <div id="panel">
      <span id="close">X</span>
      <h2 id="panel-title"></h2>
      <div id="panel-body"></div>
    </div>

    <div style="display: flex; flex-direction: row; gap: 1rem">
      <svg id="scatter-plot" width="100%" height="900"></svg>
      <div id="scatter-tooltip"></div>
    </div>

    <script type="module" src="./js/visualizations/network.js"></script>
    <script type="module" src="./js/visualizations/scatter.js"></script>
  </body>
</html>
