<!DOCTYPE html>
<html>

<head>
  <title>Document</title>
  <style>
    :root {
      --background-color: rgb(26, 24, 24);
      --text-color: rgb(255, 255, 230);
      --primary-color: rgb(248, 175, 47);
      --primary-color-background: rgb(108, 59, 10);
      --secondary-color: rgb(0, 177, 253);
      --secondary-color-background: rgb(30, 53, 87);
      --third-color: rgb(253, 93, 0);
      --third-color-background: rgb(80, 24, 20);
    }

    body {
      background-color: var(--background-color);
    }

    #search {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      border: 1px solid gray;
      border-radius: 24px;
      padding: 8px 20px;
      color: white;
      font-size: 14px;
      width: 300px;
      outline: none;
    }
  </style>
</head>

<body>
  <div>
    <svg id="network-graph" width="1500" height="900"></svg>
    <button id="back">Back To Departments</button>
    <input id="search" type="text" placeholder="Search For Careers Within This Department" />
    <div id="panel" style="
          display: none;
          position: fixed;
          top: 0;
          right: 0;
          width: 320px;
          height: 100vh;
          background: navy;
          padding: 24px;
          overflow-y: auto;
          color: white;
          font-size: 13px;
        ">
      <span id="close" style="
            position: absolute;
            top: 16px;
            right: 16px;
            cursor: pointer;
            color: gray;
            font-size: 18px;
          ">
        X</span>
      <h2 id="panel-title" style="font-size: 16px; margin-bottom: 14px; padding-right: 24px"></h2>
      <div id="panel-body"></div>
    </div>
    <link rel="stylesheet" href="css/main.css">
    </head>

    <body>
      <div>
        <svg id="network-graph" width="1500" height="900"></svg>
      </div>
      <div style="display:flex;flex-direction:row;gap: 1rem">
        <svg id="scatter-plot" width="100%" height="900"></svg>
        <div id="scatter-tooltip"></div>
      </div>
      <script type="module" src="./js/visualizations/network.js"></script>
      <script type="module" src="./js/visualizations/scatter.js"></script>
    </body>

</html>
