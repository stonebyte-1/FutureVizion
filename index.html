<!DOCTYPE html>
<html lang="en">
  <head>
    <title>FutureVizion</title>
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/network.css" />
  </head>
  <body>
    <div id="welcome" class="active">
      <h1 id="welcome-title">FutureVizion</h1>
      <p id="welcome-sub">What would you like to explore?</p>
      <div id="welcome-buttons">
        <button class="welcome-btn" data-target="view-network">
          <span class="btn-title">Explore Careers</span>
          <span class="btn-sub">Browse all occupations by sector</span>
        </button>
        <button class="welcome-btn" data-target="view-barchart">
          <span class="btn-title">Tech Career Outlook</span>
          <span class="btn-sub">See AI risk vs opportunity in tech</span>
        </button>
        <button class="welcome-btn" data-target="view-scatter">
          <span class="btn-title">Employment & AI Exposure</span>
          <span class="btn-sub">How many careers are affected by GenAI</span>
        </button>
      </div>
    </div>
    <svg id="network-graph" width="100%" height="900"></svg>
    <button id="back">Back To Departments</button>
    <input
      id="search"
      type="text"
      placeholder="Search For Careers Within This Department"
    />
    <div id="panel">
      <span id="close">X</span>
      <h2 id="panel-title"></h2>
      <div id="panel-body"></div>
    </div>
    <div>
      <h1>Tech Careers: AI Risk vs. Opportunity Score</h1>
      <p>
        Left = AI Exposure Risk (%) | Right = Opportunity Score (Salary +
        Growth)
      </p>
      <div id="barchart-chart"></div>
      <div id="barchart-tooltip"></div>
    </div>
    <div style="display: flex; flex-direction: row; gap: 1rem">
      <svg id="scatter-plot" width="100%" height="900"></svg>
      <div id="scatter-tooltip"></div>
    </div>
    <script type="module" src="./js/visualizations/barchart.js"></script>
    <script type="module" src="./js/visualizations/network.js"></script>
    <script type="module" src="./js/visualizations/scatter.js"></script>
    <script>
      // welcome screen buttons
      document.querySelectorAll(".welcome-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document.getElementById("welcome").classList.remove("active");
          document
            .querySelectorAll(".view")
            .forEach((v) => v.classList.remove("active"));
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("active"));
          const target = btn.dataset.target;
          document.getElementById(target).classList.add("active");
          document
            .querySelector(`[data-target="${target}"]`)
            .classList.add("active");
        });
      });

      // tab buttons
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.getElementById("welcome").classList.remove("active");
          document
            .querySelectorAll(".tab")
            .forEach((t) => t.classList.remove("active"));
          document
            .querySelectorAll(".view")
            .forEach((v) => v.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById(tab.dataset.target).classList.add("active");
        });
      });
    </script>
  </body>
</html>
